name: android-ci

# Android beta slice 8 (issue #204, hub #196): the first point where "does
# the Android app actually build" gets a real, automated answer. Neither
# this remote environment nor (until now) the founder's own machine had a
# JDK/Android SDK/NDK/Gradle to run this locally -- a GitHub-hosted runner
# does, so this is the first genuine build of the app anywhere.
#
# Split into its own workflow rather than folded into ci.yml, mirroring the
# reasoning behind reproducibility.yml's own split (D-0314): a full Gradle
# + NDK build is a different, heavier, differently-flaky cost class than
# the Rust-only jobs in ci.yml, and shouldn't share a required-check
# failure mode with them.
#
# Same docs-only-skip shape as reproducibility.yml (D-0325): a required
# check that never runs for a docs-only PR gets stuck at
# `mergeable_state: blocked` forever, so this workflow always completes
# with a real conclusion -- the "is this docs-only" step decides whether
# the actual build steps run, not whether the job exists at all.
on:
  push:
    branches: [main]
  pull_request: {}

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  # Builds the Rust `mini-ffi` native libraries for both Android ABIs this
  # workspace targets, then assembles the debug APK end to end -- issue
  # #204's acceptance test step 1. Every toolchain piece is pinned to the
  # exact version `docs/mobile/ANDROID_FOUNDATION.md` names (AGP/Kotlin/
  # Compose-BOM are already pinned in-repo via `gradle/libs.versions.toml`
  # and can't silently drift on the runner; JDK/Android SDK
  # platform/build-tools/NDK/Gradle/cargo-ndk are runner-ambient state and
  # each gets an explicit install-then-verify step so a drift fails loudly
  # (step 2) instead of Gradle quietly picking up whatever the runner
  # image happens to ship.
  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # Mirrors reproducibility.yml's own docs-only check exactly (same
      # two path patterns) so this required check always posts a real
      # conclusion for a docs-only PR instead of never running.
      - name: Determine whether this PR touches only docs
        id: diff
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" \
              | grep -vE '^(docs/|.*\.md$)' | grep -q .; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Docs-only PR -- no build artifact could have changed
        if: steps.diff.outputs.docs_only == 'true'
        run: |
          echo "Every changed path in this PR matches docs/** or **/*.md." \
            "No Android build artifact could differ, so the assembly" \
            "steps below are skipped. This step still gives the required" \
            "'android-apk' status check a real conclusion for this PR."

      - name: Set up JDK 17
        if: steps.diff.outputs.docs_only != 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Install pinned Android SDK components
        if: steps.diff.outputs.docs_only != 'true'
        run: |
          sdkmanager="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$sdkmanager" ]; then
            echo "sdkmanager not found at $sdkmanager -- the runner image" \
              "no longer ships the Android cmdline-tools this job assumes." >&2
            exit 1
          fi
          yes | "$sdkmanager" --licenses >/dev/null
          "$sdkmanager" "platforms;android-37" "build-tools;36.0.0" "ndk;28.2.13676358"

      - name: Verify installed toolchain matches ANDROID_FOUNDATION.md exactly
        if: steps.diff.outputs.docs_only != 'true'
        run: |
          set -eu
          java -version 2>&1 | grep -q '"17\.' || {
            echo "JDK drifted from pinned 17: $(java -version 2>&1 | head -1)" >&2
            exit 1
          }
          test -d "$ANDROID_HOME/platforms/android-37" || {
            echo "Android SDK platform 37 is not installed" >&2
            exit 1
          }
          test -d "$ANDROID_HOME/build-tools/36.0.0" || {
            echo "Android build-tools 36.0.0 is not installed" >&2
            exit 1
          }
          test -d "$ANDROID_HOME/ndk/28.2.13676358" || {
            echo "Android NDK 28.2.13676358 is not installed" >&2
            exit 1
          }
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Install Rust Android targets
        if: steps.diff.outputs.docs_only != 'true'
        run: rustup target add aarch64-linux-android x86_64-linux-android

      - name: Install cargo-ndk 4.1.2
        if: steps.diff.outputs.docs_only != 'true'
        run: |
          cargo install cargo-ndk --version 4.1.2 --locked
          cargo ndk --version | grep -q '4\.1\.2' || {
            echo "cargo-ndk drifted from pinned 4.1.2: $(cargo ndk --version)" >&2
            exit 1
          }

      - name: Build Rust mini-ffi native libraries (debug)
        if: steps.diff.outputs.docs_only != 'true'
        run: app/android/scripts/build-rust.sh debug

      - name: Set up Gradle 9.5.0
        if: steps.diff.outputs.docs_only != 'true'
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          gradle-version: '9.5.0'

      - name: Verify Gradle version matches ANDROID_FOUNDATION.md
        if: steps.diff.outputs.docs_only != 'true'
        run: |
          gradle --version | grep -q 'Gradle 9.5.0' || {
            echo "Gradle drifted from pinned 9.5.0" >&2
            exit 1
          }

      - name: Assemble debug APK
        if: steps.diff.outputs.docs_only != 'true'
        run: gradle -p app/android :app:assembleDebug --stacktrace

      - name: Upload debug APK
        if: steps.diff.outputs.docs_only != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mininet-debug-apk
          path: app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # Issue #204's acceptance test step 3: a failure must be diagnosable
      # without local reproduction. Uploaded unconditionally on failure of
      # any prior step in this job, not just the assemble step, since a
      # toolchain-install failure can also produce useful Gradle/SDK logs.
      - name: Upload build logs and reports on failure
        if: failure() && steps.diff.outputs.docs_only != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-build-logs
          path: |
            app/android/**/build/reports/**
            app/android/**/build/outputs/logs/**
          if-no-files-found: ignore
