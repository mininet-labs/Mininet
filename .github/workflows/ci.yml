name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

# Least-privilege default: this workflow only reads and checks the repo, it
# never needs to write anything (no releases, no PR comments, no pushes).
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # rust-toolchain.toml pins the channel + components; rustup honours it.
      - name: Show toolchain
        run: rustup show

      # mini-build-runner-wasmtime's adversarial suite (D-0069, Batch 2b.3)
      # compiles real guest fixtures with `rustc --target wasm32-wasip2` at
      # test time; the target isn't part of rust-toolchain.toml's
      # `components` list (that's for rustfmt/clippy, not cross-compile
      # targets) so it needs its own explicit install step here.
      - name: Install wasm32-wasip2 target
        run: rustup target add wasm32-wasip2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all --all-features

  # Dependency-vulnerability scanning (roadmap #73). Uses the official
  # RustSec action rather than `cargo install cargo-audit`, deliberately:
  # a locally-`cargo install`ed cargo-audit compiles against *this repo's*
  # pinned toolchain (rust-toolchain.toml; this was written against 1.83.0,
  # since bumped for Wasmtime -- see that file's own history), and the
  # newest cargo-audit compatible with the toolchain at the time (0.21.2)
  # could not parse
  # the current RustSec advisory database -- it contains CVSS 4.0 entries
  # newer rustsec-crate releases understand and 0.21.2's does not, so it
  # fails to even load the database, before checking a single dependency.
  # Confirmed locally: `cargo install cargo-audit --version 0.21.2 --locked`
  # then `cargo audit` errors on `error parsing .../RUSTSEC-2026-0041.md:
  # unsupported CVSS version: 4.0`. This action ships its own prebuilt
  # cargo-audit binary, decoupled from this repo's toolchain pin, so it
  # isn't affected. Advisory-only for now: it reports, it doesn't fail the
  # build, since this workspace has no process yet for triaging an
  # advisory against an unreleasable pinned dependency version.
  #
  # Update (D-0341, issue #203): a real PR run of this job (#211) shows the
  # action's own install step actually failing outright -- `cargo install
  # cargo-audit` inside the checked-out repo picks up rust-toolchain.toml's
  # pinned 1.94.1 (via rustup) rather than a decoupled prebuilt binary, and
  # `cargo-audit`'s own `kstring` dependency now needs rustc 1.96+. The
  # "ships its own prebuilt binary" premise above no longer holds for the
  # pinned action SHA -- `continue-on-error: true` has been silently
  # masking a hard failure, not just an advisory-only report. Left as a
  # documented gap rather than fixed here: a real fix needs either a
  # rust-toolchain.toml bump (its own, wider decision) or replacing this
  # action, neither in scope for issue #203's `cargo-deny` verification.
  dependency-audit:
    runs-on: ubuntu-latest
    # This job alone needs to post a check-run result; every other job in
    # this workflow stays on the top-level contents:read-only default.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # License/advisory/source policy for the whole resolved dependency
  # graph (D-0069 dependency-governance requirement, first exercised by
  # mini-build-runner-wasmtime's Wasmtime dependency). Config lives in
  # `deny.toml` at the repo root.
  #
  # D-0341 (Android beta slice 7, issue #203): `cargo-deny` v0.20.2 has now
  # been installed and run for real against this workspace's `Cargo.lock`,
  # closing the "unverified config" gap this job's `continue-on-error`
  # existed for -- `deny.toml`'s every allowance is now a specific,
  # reasoned response to a real finding (see that file's comments), not a
  # guess. This job now actually gates merges.
  dependency-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check

  # SPEC-11's verified-reproducible release check moved to its own workflow
  # (.github/workflows/reproducibility.yml, D-0314): two full clean release
  # builds take 10+ minutes, and gating every PR push -- including
  # docs/research-only PRs that cannot possibly change a build artifact --
  # was slowing down unrelated work without buying any additional
  # assurance. The frozen SPEC-11 requirement itself is untouched: the
  # separate workflow still runs on every push to `main` unconditionally,
  # and on any pull request that touches something other than `docs/**` or
  # markdown.
