[package]
name = "mini-treasury"
version = "0.0.1"
description = "Community-governed BTC/XMR-to-MINI contribution bookkeeping (whitepaper SS8.2/SS10) plus a founder-overridden (D-0037), AI-authored FROST threshold-signature custody prototype pending external cryptography audit; cross-chain receipt verification remains explicitly out of scope here."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
publish = false

[dependencies]
did-mini = { path = "../did-mini" }
# Same audited primitive-layer crate ed25519-dalek/x25519-dalek already
# build on (D-0014's precedent) -- the raw Ristretto group only. The FROST
# threshold-signature protocol built on top is Mininet-owned (D-0037).
# "zeroize" is on by default upstream, but named explicitly here so this
# crate's own zeroization guarantee (SigningNonces, issue #93) doesn't
# depend on that staying true by accident.
curve25519-dalek = { version = "4", features = ["zeroize"] }
blake3 = "1"
mini-crypto = { path = "../mini-crypto" }
zeroize = "1" # zeroizes FROST round-1 nonces on drop (issue #93)
