name: governance-policy

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  governance-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Check out canonical checkpoint
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          path: .canonical-checkpoint
          persist-credentials: false
      - name: Test governance validator
        run: python3 -m unittest discover -s tools -p 'test_*.py'
      - name: Validate governance policy baseline
        run: >-
          python3 tools/check_governance.py
          --mode baseline
          --canonical-root .canonical-checkpoint
          --candidate-activation

  proposal-metadata:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check out canonical pull-request base
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .canonical-checkpoint
          persist-credentials: false
      - name: Save proposal body and changed paths
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          printf '%s' "$PR_BODY" > /tmp/proposal-body.md
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > /tmp/changed-paths.txt
      - name: Validate proposal metadata
        run: |
          python3 tools/check_governance.py \
            --mode proposal \
            --canonical-root .canonical-checkpoint \
            --candidate-activation \
            --proposal-body /tmp/proposal-body.md \
            --changed-paths /tmp/changed-paths.txt
